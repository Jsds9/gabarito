<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leitor de Gabarito</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

button{
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:8px;
  font-size:16px;
}

.tela{
  display:none;
  padding:20px;
}

.ativa{
  display:block;
}

#camera-container{
  position:relative;
  width:100%;
  max-width:500px;
  margin:auto;
}

video, canvas{
  width:100%;
  border-radius:10px;
}

canvas{
  position:absolute;
  top:0;
  left:0;
}
</style>
</head>

<body>

<!-- TELA 1 -->
<div id="tela1" class="tela ativa">
  <h2>Leitor de Gabarito</h2>
  <button onclick="mostrarTela('tela2')">Iniciar</button>
</div>

<!-- TELA 2 -->
<div id="tela2" class="tela">
  <h3>Configurar Prova</h3>

  <label>Quantidade de questões:</label>
 <select id="qtdQuestoes" onchange="gerarLista()">
    <option value="5">5</option>
    <option value="10">10</option>
    <option value="15">15</option>
    <option value="20" selected>20</option>
  </select>

  <div id="lista"></div>

  <button onclick="salvarGabarito()">Salvar e iniciar correção</button>
</div>

<!-- TELA 3 -->
<div id="tela3" class="tela">
  <h3>Correção</h3>

  <div id="camera-container">
    <video id="video" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
  </div>

  <br>
  <button onclick="capturar()">Capturar</button>
  <button onclick="analisar()" id="btnAnalisar" disabled>Analisar</button>

  <div id="resultado"></div>

  <button onclick="corrigirProximo()">Corrigir próximo</button>
  <button onclick="mostrarTela('tela2')">Alterar gabarito</button>
</div>

<script>
let gabarito = [];
let imagemCapturada = null;
let pontos = [];

const video = document.getElementById("video");
const overlay = document.getElementById("overlay");
const ctx = overlay.getContext("2d");

function mostrarTela(id){
  document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
  document.getElementById(id).classList.add("ativa");
  if(id === "tela2") gerarLista();
}

function gerarLista(){
  let qtd = parseInt(document.getElementById("qtdQuestoes").value);
  let lista = document.getElementById("lista");
  lista.innerHTML = "";
  for(let i=1;i<=qtd;i++){
    lista.innerHTML += `
      <div>Questão ${i}:
        <select id="q${i}">
          <option value="">-</option>
          <option>A</option>
          <option>B</option>
          <option>C</option>
          <option>D</option>
          <option>E</option>
        </select>
      </div>
    `;
  }
}

function salvarGabarito(){
  let qtd = parseInt(document.getElementById("qtdQuestoes").value);
  gabarito = [];

  for(let i=1;i<=qtd;i++){
    let val = document.getElementById("q"+i).value;
    if(val===""){ alert("Preencha todas!"); return; }
    gabarito.push(val);
  }

  localStorage.setItem("gabarito", JSON.stringify(gabarito));
  localStorage.setItem("qtd", qtd);

  iniciarCamera();
  mostrarTela("tela3");
}

function iniciarCamera(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
  .then(stream=> video.srcObject = stream);

  video.onloadedmetadata = ()=>{
    overlay.width = video.videoWidth;
    overlay.height = video.videoHeight;
  };
}

function capturar(){
  let temp = document.createElement("canvas");
  temp.width = overlay.width;
  temp.height = overlay.height;
  let tctx = temp.getContext("2d");
  tctx.drawImage(video,0,0);
  imagemCapturada = tctx.getImageData(0,0,temp.width,temp.height);

  ctx.putImageData(imagemCapturada,0,0);

  pontos = [];
  document.getElementById("btnAnalisar").disabled = true;

  overlay.onclick = marcarPonto;
  alert("Toque nos 4 cantos do gabarito.");
}

function marcarPonto(e){
  if(pontos.length>=4) return;

  let rect = overlay.getBoundingClientRect();
  let x = (e.clientX - rect.left) * (overlay.width / rect.width);
  let y = (e.clientY - rect.top) * (overlay.height / rect.height);

  pontos.push({x,y});

  ctx.fillStyle="lime";
  ctx.beginPath();
  ctx.arc(x,y,8,0,2*Math.PI);
  ctx.fill();

  if(pontos.length===4){
    overlay.onclick=null;
    document.getElementById("btnAnalisar").disabled=false;
  }
}

function analisar(){
  let qtd = parseInt(localStorage.getItem("qtd"));
  gabarito = JSON.parse(localStorage.getItem("gabarito"));

  let [p1,p2,p3,p4] = pontos;

  let larguraTop = p2.x - p1.x;
  let alturaLeft = p4.y - p1.y;

  let respostas=[];
  let letras=["A","B","C","D","E"];

  for(let i=0;i<qtd;i++){
    let resposta=null;

    for(let j=0;j<5;j++){

      let x = p1.x + (larguraTop*(j+0.5)/5);
      let y = p1.y + (alturaLeft*(i+0.5)/qtd);

     let soma = 0;
let contador = 0;

for(let dx=-5; dx<=5; dx++){
  for(let dy=-5; dy<=5; dy++){
    let px = Math.floor(x + dx);
    let py = Math.floor(y + dy);

    if(px>=0 && py>=0 && px<overlay.width && py<overlay.height){
      let index = (py*overlay.width + px)*4;
      let r = imagemCapturada.data[index];
      let g = imagemCapturada.data[index+1];
      let b = imagemCapturada.data[index+2];
      soma += (r+g+b)/3;
      contador++;
    }
  }
}

let brilho = soma/contador;


      if(brilho<100) resposta = letras[j];
    }

    respostas.push(resposta);
  }

  let acertos=0;
  for(let i=0;i<qtd;i++){
    if(respostas[i]===gabarito[i]) acertos++;
  }

  document.getElementById("resultado").innerText =
    "Acertos: "+acertos+" de "+qtd;
}

function corrigirProximo(){
  pontos=[];
  imagemCapturada=null;
  document.getElementById("resultado").innerText="";
  iniciarCamera();
}
</script>

</body>
</html>
