<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leitor de Gabarito - Protótipo</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

button{
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:8px;
  font-size:16px;
}

select{
  padding:5px;
  font-size:16px;
}

.tela{
  display:none;
  padding:20px;
}

.ativa{
  display:block;
}

#camera-container{
  position:relative;
  width:100%;
  max-width:500px;
  margin:auto;
}

video{
  width:100%;
  border-radius:10px;
}

canvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

.linha-config{
  margin:8px 0;
}
</style>
</head>

<body>

<!-- TELA 1 -->
<div id="tela1" class="tela ativa">
  <h2>Leitor de Gabarito</h2>
  <button onclick="irParaConfiguracao()">Iniciar</button>
</div>

<!-- TELA 2 -->
<div id="tela2" class="tela">
  <h3>Configurar Prova</h3>

  <label>Quantidade de questões:</label>
  <select id="qtdQuestoes" onchange="gerarLista()">
    <option value="5">5</option>
    <option value="10">10</option>
    <option value="15">15</option>
    <option value="20" selected>20</option>
  </select>

  <div id="listaQuestoes"></div>

  <button onclick="salvarEIniciar()">Salvar e iniciar correção</button>
</div>

<!-- TELA 3 -->
<div id="tela3" class="tela">
  <h3>Correção</h3>

  <div id="camera-container">
    <video id="video" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
  </div>

  <br>
  <button onclick="capturar()">Capturar</button>
  <button onclick="analisar()">Analisar</button>

  <div id="resultado"></div>

  <button onclick="corrigirProximo()">Corrigir próximo</button>
  <button onclick="alterarGabarito()">Alterar gabarito</button>
</div>

<script>
let gabarito = [];
let imagemCapturada = null;

const video = document.getElementById("video");
const overlay = document.getElementById("overlay");
const ctx = overlay.getContext("2d");

function mostrarTela(id){
  document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
  document.getElementById(id).classList.add("ativa");
}

function irParaConfiguracao(){
  mostrarTela("tela2");
  gerarLista();
}

function gerarLista(){
  let qtd = parseInt(document.getElementById("qtdQuestoes").value);
  let lista = document.getElementById("listaQuestoes");
  lista.innerHTML = "";

  for(let i=1;i<=qtd;i++){
    lista.innerHTML += `
      <div class="linha-config">
        Questão ${i}:
        <select id="q${i}">
          <option value="">-</option>
          <option>A</option>
          <option>B</option>
          <option>C</option>
          <option>D</option>
          <option>E</option>
        </select>
      </div>
    `;
  }
}

function salvarEIniciar(){
  let qtd = parseInt(document.getElementById("qtdQuestoes").value);
  gabarito = [];

  for(let i=1;i<=qtd;i++){
    let valor = document.getElementById("q"+i).value;
    if(valor === ""){
      alert("Preencha todas as questões!");
      return;
    }
    gabarito.push(valor);
  }

  localStorage.setItem("gabarito", JSON.stringify(gabarito));
  localStorage.setItem("qtdQuestoes", qtd);

  iniciarCamera();
  mostrarTela("tela3");
}

function iniciarCamera(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
  .then(stream=>{
    video.srcObject = stream;
  });

  video.onloadedmetadata = ()=>{
    overlay.width = video.videoWidth;
    overlay.height = video.videoHeight;
    desenharGrid();
  };
}

function desenharGrid(){
  ctx.clearRect(0,0,overlay.width,overlay.height);

  let largura = overlay.width * 0.8;
  let altura = overlay.height * 0.75;
  let inicioX = (overlay.width - largura)/2;
  let inicioY = (overlay.height - altura)/2;

  ctx.strokeStyle="lime";
  ctx.lineWidth=2;
  ctx.strokeRect(inicioX,inicioY,largura,altura);

  let qtd = parseInt(localStorage.getItem("qtdQuestoes"));
  let linhas = qtd;
  let colunas = 5;

  let alturaLinha = altura/linhas;
  let larguraColuna = largura/colunas;

  ctx.lineWidth=1;

  for(let i=1;i<linhas;i++){
    ctx.beginPath();
    ctx.moveTo(inicioX, inicioY + i*alturaLinha);
    ctx.lineTo(inicioX + largura, inicioY + i*alturaLinha);
    ctx.stroke();
  }

  for(let j=1;j<colunas;j++){
    ctx.beginPath();
    ctx.moveTo(inicioX + j*larguraColuna, inicioY);
    ctx.lineTo(inicioX + j*larguraColuna, inicioY + altura);
    ctx.stroke();
  }
}

function capturar(){
  let canvasTemp = document.createElement("canvas");
  canvasTemp.width = overlay.width;
  canvasTemp.height = overlay.height;
  let ctxTemp = canvasTemp.getContext("2d");
  ctxTemp.drawImage(video,0,0);
  imagemCapturada = ctxTemp.getImageData(0,0,canvasTemp.width,canvasTemp.height);
  alert("Imagem capturada!");
}

function analisar(){
  if(!imagemCapturada){
    alert("Capture a imagem primeiro!");
    return;
  }

  gabarito = JSON.parse(localStorage.getItem("gabarito"));
  let qtd = parseInt(localStorage.getItem("qtdQuestoes"));

  let largura = overlay.width * 0.8;
  let altura = overlay.height * 0.75;
  let inicioX = (overlay.width - largura)/2;
  let inicioY = (overlay.height - altura)/2;

  let linhas = qtd;
  let colunas = 5;
  let alturaLinha = altura/linhas;
  let larguraColuna = largura/colunas;

  let respostasMarcadas=[];
  let letras=["A","B","C","D","E"];

  for(let i=0;i<linhas;i++){
    let resposta=null;

    for(let j=0;j<colunas;j++){
      let x = Math.floor(inicioX + j*larguraColuna + larguraColuna/2);
      let y = Math.floor(inicioY + i*alturaLinha + alturaLinha/2);

      let index = (y*overlay.width + x)*4;
      let r = imagemCapturada.data[index];
      let g = imagemCapturada.data[index+1];
      let b = imagemCapturada.data[index+2];

      let brilho = (r+g+b)/3;

      if(brilho < 100){
        resposta = letras[j];
      }
    }

    respostasMarcadas.push(resposta);
  }

  let acertos=0;
  for(let i=0;i<linhas;i++){
    if(respostasMarcadas[i]===gabarito[i]){
      acertos++;
    }
  }

  document.getElementById("resultado").innerText =
    "Acertos: " + acertos + " de " + linhas;
}

function corrigirProximo(){
  imagemCapturada = null;
  document.getElementById("resultado").innerText = "";
}

function alterarGabarito(){
  mostrarTela("tela2");
}
</script>

</body>
</html>
