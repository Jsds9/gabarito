<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor de Gabarito</title>
<style>
body{
  font-family: Arial, sans-serif;
  text-align:center;
  margin:0;
  background:#f4f4f4;
}
.container{ padding:20px; }
button{
  padding:12px 20px;
  margin:10px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#2c7be5;
  color:white;
}
select{
  padding:8px;
  font-size:16px;
}
canvas{
  max-width:100%;
  border:1px solid #ccc;

}
.hidden{ display:none; }
</style>
</head>
<body>

<div id="tela1" class="container">

</div>

<div id="tela2" class="container hidden">

  <select id="qtdQuestoes" onchange="gerarLista()">
    <option value="5">5</option>
    <option value="10">10</option>
    <option value="15">15</option>
    <option value="20" selected>20</option>
  </select>

  <div id="listaGabarito"></div>

  <button onclick="irTela3()">Avançar</button>
</div>

<div id="tela3" class="container hidden">
  <video id="video" autoplay playsinline></video>
  <br>
  <button onclick="capturar()">Capturar</button>
  <br>
  <canvas id="canvas"></canvas>
  <br>
  <button onclick="analisar()">Analisar</button>
  <button onclick="corrigirProximo()">Corrigir Próximo</button>
  <button onclick="alterarGabarito()">Alterar Gabarito</button>
  <h3 id="resultado"></h3>
</div>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let stream;
let respostasCorretas = [];
let imagemBase = null;

let hLine1Y = 200;
let hLine2Y = 260;

let vLineLeftX = 100;
let vLineRightX = 300;

let draggingLine = null;

let linhaSelecionada = null;

function irTela2(){
  tela1.classList.add("hidden");
  tela2.classList.remove("hidden");
  gerarLista();
}

function irTela3(){
  respostasCorretas = [];
  let qtd = parseInt(qtdQuestoes.value);
  for(let i=1;i<=qtd;i++){
    respostasCorretas.push(
      document.getElementById("q"+i).value
    );
  }
  tela2.classList.add("hidden");
  tela3.classList.remove("hidden");
  iniciarCamera();
}

function gerarLista(){
  let qtd = parseInt(qtdQuestoes.value);
  listaGabarito.innerHTML = "";
  for(let i=1;i<=qtd;i++){
    listaGabarito.innerHTML += `
      <div>
        Questão ${i}
        <select id="q${i}">
          <option>A</option>
          <option>B</option>
          <option>C</option>
          <option>D</option>
          <option>E</option>
        </select>
      </div>
    `;
  }
}

async function iniciarCamera(){
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });
  video.srcObject = stream;
}

 function capturar(){
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

imagemBase = ctx.getImageData(0,0,canvas.width,canvas.height);

  video.style.display="none";

  criarLinhasIniciais();
desenharLinhas();


function criarLinhasIniciais(){

  linha1Y = canvas.height * 0.4;
  linha2Y = canvas.height * 0.5;

}

    {x:margemX,y:margemY},
    {x:canvas.width-margemX,y:margemY},
    {x:canvas.width-margemX,y:canvas.height-margemY},
    {x:margemX,y:canvas.height-margemY}
  ];
}

function drawReferenceLines(ctx, canvas) {
    ctx.lineWidth = 3;

    // 🟡 Horizontais
    ctx.strokeStyle = "yellow";

    ctx.beginPath();
    ctx.moveTo(0, hLine1Y);
    ctx.lineTo(canvas.width, hLine1Y);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0, hLine2Y);
    ctx.lineTo(canvas.width, hLine2Y);
    ctx.stroke();

    // 🔵 Verticais
    ctx.strokeStyle = "blue";

    ctx.beginPath();
    ctx.moveTo(vLineLeftX, 0);
    ctx.lineTo(vLineLeftX, canvas.height);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(vLineRightX, 0);
    ctx.lineTo(vLineRightX, canvas.height);
    ctx.stroke();
}
drawReferenceLines(ctx, canvas);


canvas.addEventListener("mousedown", function(e) {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const tolerance = 10;

    if (Math.abs(y - hLine1Y) < tolerance) {
        draggingLine = "h1";
    } else if (Math.abs(y - hLine2Y) < tolerance) {
        draggingLine = "h2";
    } else if (Math.abs(x - vLineLeftX) < tolerance) {
        draggingLine = "vLeft";
    } else if (Math.abs(x - vLineRightX) < tolerance) {
        draggingLine = "vRight";
    }
});


canvas.addEventListener("mousemove", function(e) {
    if (!draggingLine) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if (draggingLine === "h1") {
        hLine1Y = y;
    } else if (draggingLine === "h2") {
        hLine2Y = y;
    } else if (draggingLine === "vLeft") {
        vLineLeftX = x;
    } else if (draggingLine === "vRight") {
        vLineRightX = x;
    }

}


canvas.addEventListener("mouseup", function() {
    draggingLine = null;
});



function analisar(){

  let qtd = respostasCorretas.length;
  let acertos = 0;

  // garantir ordem correta
  let y1 = Math.min(linha1Y, linha2Y);
  let y2 = Math.max(linha1Y, linha2Y);

  let distancia = y2 - y1;

  for(let i = 0; i < qtd; i++){

    let y = y1 + distancia * i;

    let medias = [];

    for(let j = 0; j < 5; j++){

      let x = canvas.width * (0.3 + (0.4/5) * (j + 0.5));

      let imgData = ctx.getImageData(x-7, y-7, 14, 14).data;

      let soma = 0;

      for(let k = 0; k < imgData.length; k += 4){
        soma += imgData[k];
      }

      let media = soma / (imgData.length / 4);
      medias.push(media);
    }

    let menor = Math.min(...medias);
    let indice = medias.indexOf(menor);
    let marcada = "ABCDE"[indice];

    if(marcada === respostasCorretas[i]){
      acertos++;
    }
  }

  resultado.innerText = `${acertos} acertos de ${qtd}`;
}


function corrigirProximo(){
  resultado.innerText="";
  video.style.display="block";
  iniciarCamera();
}

function alterarGabarito(){
  tela3.classList.add("hidden");
  tela2.classList.remove("hidden");
}
</script>
</body>
</html>
