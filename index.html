<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor de Gabarito</title>
<style>
body{
  font-family: Arial, sans-serif;
  text-align:center;
  margin:0;
  background:#f4f4f4;
}
.container{ padding:20px; }
button{
  padding:12px 20px;
  margin:10px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#2c7be5;
  color:white;
}
select{
  padding:8px;
  font-size:16px;
}
canvas{
  max-width:100%;
  border:1px solid #ccc;
  margin-top:10px;
}
.hidden{ display:none; }
</style>
</head>
<body>

<div id="tela1" class="container">
  <h2>Leitor de Gabarito</h2>
  <button onclick="irTela2()">Avançar</button>
</div>

<div id="tela2" class="container hidden">
  <h3>Quantidade de Questões</h3>
  <select id="qtdQuestoes" onchange="gerarLista()">
    <option value="5">5</option>
    <option value="10">10</option>
    <option value="15">15</option>
    <option value="20" selected>20</option>
  </select>

  <div id="listaGabarito"></div>

  <button onclick="irTela3()">Avançar</button>
</div>

<div id="tela3" class="container hidden">
  <video id="video" autoplay playsinline></video>
  <br>
  <button onclick="capturar()">Capturar</button>
  <br>
  <canvas id="canvas"></canvas>
  <br>
  <button onclick="analisar()">Analisar</button>
  <button onclick="corrigirProximo()">Corrigir Próximo</button>
  <button onclick="alterarGabarito()">Alterar Gabarito</button>
  <h3 id="resultado"></h3>
</div>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let stream;
let respostasCorretas = [];
let pontos = [];
let pontoSelecionado = null;
let raio = 15;
let imagemBase = null;


function irTela2(){
  tela1.classList.add("hidden");
  tela2.classList.remove("hidden");
  gerarLista();
}

function irTela3(){
  respostasCorretas = [];
  let qtd = parseInt(qtdQuestoes.value);
  for(let i=1;i<=qtd;i++){
    respostasCorretas.push(
      document.getElementById("q"+i).value
    );
  }
  tela2.classList.add("hidden");
  tela3.classList.remove("hidden");
  iniciarCamera();
}

function gerarLista(){
  let qtd = parseInt(qtdQuestoes.value);
  listaGabarito.innerHTML = "";
  for(let i=1;i<=qtd;i++){
    listaGabarito.innerHTML += `
      <div>
        Questão ${i}
        <select id="q${i}">
          <option>A</option>
          <option>B</option>
          <option>C</option>
          <option>D</option>
          <option>E</option>
        </select>
      </div>
    `;
  }
}

async function iniciarCamera(){
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });
  video.srcObject = stream;
}

 function capturar(){
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
 ctx.drawImage(video,0,0);
imagemBase = ctx.getImageData(0,0,canvas.width,canvas.height);


  stream.getTracks().forEach(track=>track.stop());
  video.style.display="none";

  criarRetanguloInicial();
  desenhar();
}

function criarRetanguloInicial(){
  let margemX = canvas.width*0.2;
  let margemY = canvas.height*0.2;

  pontos = [
    {x:margemX,y:margemY},
    {x:canvas.width-margemX,y:margemY},
    {x:canvas.width-margemX,y:canvas.height-margemY},
    {x:margemX,y:canvas.height-margemY}
  ];
}

function desenhar(){

  ctx.putImageData(imagemBase, 0, 0);

  ctx.strokeStyle="red";
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(pontos[0].x,pontos[0].y);
  for(let i=1;i<4;i++){
    ctx.lineTo(pontos[i].x,pontos[i].y);
  }
  ctx.closePath();
  ctx.stroke();

  ctx.fillStyle="blue";
  pontos.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,raio,0,Math.PI*2);
    ctx.fill();
  });
}

canvas.addEventListener("pointerdown", e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;

  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;

  pontos.forEach((p, i) => {
    const dx = p.x - x;
    const dy = p.y - y;
    if (Math.sqrt(dx * dx + dy * dy) < raio) {
      pontoSelecionado = i;
    }
  });
});

canvas.addEventListener("pointermove", e => {
  if (pontoSelecionado !== null) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;

    let x = (e.clientX - rect.left) * scaleX;
    let y = (e.clientY - rect.top) * scaleY;

    x = Math.max(0, Math.min(canvas.width, x));
    y = Math.max(0, Math.min(canvas.height, y));

    pontos[pontoSelecionado].x = x;
    pontos[pontoSelecionado].y = y;

    desenhar();
  }
});

canvas.addEventListener("pointerup", () => {
  pontoSelecionado = null;
});


function analisar(){
  let qtd = respostasCorretas.length;
  let acertos=0;

  for(let i=0;i<qtd;i++){
    let y = pontos[0].y + ((pontos[3].y - pontos[0].y)/qtd)*(i+0.5);

    for(let j=0;j<5;j++){
      let x = pontos[0].x + ((pontos[1].x - pontos[0].x)/5)*(j+0.5);

      let imgData = ctx.getImageData(x-7,y-7,14,14).data;
      let soma=0;
      for(let k=0;k<imgData.length;k+=4){
        soma += imgData[k];
      }
      let media = soma/(imgData.length/4);

      if(media<170){
        if("ABCDE"[j]===respostasCorretas[i]){
          acertos++;
        }
      }
    }
  }

  resultado.innerText = `${acertos} acertos de ${qtd}`;
}

function corrigirProximo(){
  resultado.innerText="";
  video.style.display="block";
  iniciarCamera();
}

function alterarGabarito(){
  tela3.classList.add("hidden");
  tela2.classList.remove("hidden");
}
</script>
</body>
</html>
